name: Lint and Test
on:
  push:
  pull_request:
jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - name: lint
        run: make lint
      - name: test
        run: |
          PKGS=$(python3 -c "
          import re
          with open('README.md') as f:
              for line in f:
                  if '- [x]' not in line:
                      continue
                  m = re.search(r'\[([a-z_]+)\]\(https://github.com/plutov/practice-go/tree', line)
                  if m:
                      print('./' + m.group(1) + '/...')
          " | tr '\n' ' ')
          go test -race -v $PKGS
